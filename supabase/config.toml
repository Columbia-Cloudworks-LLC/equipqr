
# This is the project id, must be the first line of this file because the system relies on this
project_id = "oxeheowbfsshpyldlskb"

[api]
# Port to use for the API URL.
port = 54321
# Schemas to expose in your API. Tables, views and stored procedures in this schema will get API
# endpoints. public and storage are always included.
schemas = ["public", "storage", "graphql_public"]
# Extra schemas to add to the search_path of every request. public is always included.
extra_search_path = ["public", "extensions"]
# The maximum number of rows returns from a view, table, or stored procedure. Limits payload size
# for accidental or malicious requests.
max_rows = 1000

[db]
# Port to use for the local database URL.
port = 54322
# Port used by psql, the Postgres CLI, to connect to the database. Default port is changed to avoid collisions.
[db.port]
psql = "54323"

[studio]
# Port to use for Supabase Studio.
port = 54324
# External URL to use for supabase/auth/login callback. Must be a valid redirect URL for your auth providers.
auth_external_callback_url = "http://localhost:54324/auth/callback"

# Email testing server. Emails sent with the local dev setup are not actually delivered - rather, they
# are monitored, and you can view the emails that would have been delivered from the web interface.
[inbucket]
# Port to use for the email testing server web interface.
port = 54325
smtp_port = 54326
pop3_port = 54327

[auth]
# The base URL of your website. Used as an allow-list for redirects and for constructing URLs used
# in emails.
site_url = "http://localhost:3000"
# A list of *exact* URLs that auth providers are permitted to redirect to post authentication.
additional_redirect_urls = ["https://localhost:3000"]
# How long tokens are valid for, in seconds. Defaults to 3600 (1 hour), maximum 604,800 (1 week).
jwt_expiry = 3600
# Allow/disallow new user signups to your project.
enable_signup = true
# If disabled, the refresh token will never expire.
enable_refresh_token_rotation = true
# Same as JWT expiry, but for refresh token
refresh_token_reuse_interval = 10
# Specify a custom access token expiration. Only use in special circumstances.
access_token_ttl = 3600

[auth.email]
# Allow/disallow new user signups via email to your project.
enable_signup = true
# If enabled, a user will be required to confirm any email change on both the old, and new email
# addresses. If disabled, only the new email is required to confirm.
double_confirm_changes = true
# If enabled, users need to confirm their email address before signing in.
enable_confirmations = false

[auth.external.google]
enabled = false
client_id = ""
secret = ""
url = "https://accounts.google.com"
redirect_uri = ""
[auth.external.github]
enabled = false
client_id = ""
secret = ""
url = "https://github.com"
redirect_uri = ""
[auth.external.discord]
enabled = false
client_id = ""
secret = ""
url = "https://discord.com"
redirect_uri = ""

# Configure Edge Functions
[functions]
[functions.check_team_role_permission]
verify_jwt = true
[functions.validate_team_access]
verify_jwt = true
[functions.delete_team]
verify_jwt = true
[functions.repair_team_membership]
verify_jwt = true
[functions.request_role_upgrade]
verify_jwt = true

[analytics]
enabled = false
port = 54328
vector_port = 54329
